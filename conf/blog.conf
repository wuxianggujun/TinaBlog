# 博客模块配置示例

# 博客基础路径
blog_path /var/www/blog;

# 博客模板路径
blog_template_path /var/www/blog/templates;

# 是否启用缓存
blog_enable_cache on;

# 缓存时间(秒)
blog_cache_time 60;

# 数据库连接字符串
# PostgreSQL连接字符串格式: "host=localhost port=5432 dbname=blog user=postgres password=secret"
blog_db_connection "host=localhost port=5432 dbname=blog user=postgres password=YOUR_PASSWORD";

# 自动连接数据库
blog_db_auto_connect on;

# 示例位置配置：
location /blog {
    # 覆盖父级配置
    blog_template_path /var/www/blog/custom_templates;
    blog_enable_cache off;
} 