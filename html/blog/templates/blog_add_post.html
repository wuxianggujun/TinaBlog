<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - TinaBlog管理</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], 
        textarea, 
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        textarea {
            min-height: 300px;
            resize: vertical;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .error {
            color: #f44336;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #ffebee;
            border-radius: 4px;
        }
        .markdown-help {
            margin-top: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        .markdown-help h4 {
            margin-top: 0;
        }
        .markdown-help code {
            background-color: #eee;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{title}}</h1>
        <p>添加新的博客文章</p>
        <nav>
            <a href="/">首页</a> |
            <a href="/blog/admin">管理</a>
        </nav>
    </header>

    <main>
        <div class="error" style="display: {{error_display}};">
            <strong>错误:</strong> {{error_message}}
        </div>

        <form method="post" action="/blog/admin/add">
            <div class="form-group">
                <label for="title">标题</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="author">作者</label>
                <input type="text" id="author" name="author" required>
            </div>

            <div class="form-group">
                <label for="category">分类</label>
                <select id="category" name="category">
                    <option value="技术">技术</option>
                    <option value="教程">教程</option>
                    <option value="资讯">资讯</option>
                    <option value="笔记">笔记</option>
                    <option value="未分类">未分类</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tags">标签 (用逗号分隔)</label>
                <input type="text" id="tags" name="tags" placeholder="例如: C++,教程,Nginx">
            </div>

            <div class="form-group">
                <label for="content">内容 (支持Markdown格式)</label>
                <textarea id="content" name="content" required></textarea>
                
                <div class="markdown-help">
                    <h4>Markdown 格式帮助</h4>
                    <p><code># 一级标题</code> - 一级标题</p>
                    <p><code>## 二级标题</code> - 二级标题</p>
                    <p><code>**粗体文本**</code> - <strong>粗体文本</strong></p>
                    <p><code>*斜体文本*</code> - <em>斜体文本</em></p>
                    <p><code>[链接文本](http://example.com)</code> - 链接</p>
                    <p><code>![图片描述](图片URL)</code> - 图片</p>
                </div>
            </div>

            <button type="submit">发布文章</button>
        </form>
    </main>

    <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; color: #777;">
        <p>TinaBlog - 基于Nginx模块的简单博客系统</p>
    </footer>
</body>
</html>
