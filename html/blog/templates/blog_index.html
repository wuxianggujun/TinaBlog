<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinaBlog - 首页</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            color: #2c3e50;
        }
        .blog-post {
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        .post-title {
            color: #2980b9;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
        }
        .post-title:hover {
            color: #3498db;
            text-decoration: underline;
        }
        .post-meta {
            color: #7f8c8d;
            font-size: 14px;
            margin: 8px 0;
        }
        .post-summary {
            margin: 15px 0;
        }
        .read-more {
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        .read-more:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: 50px;
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>TinaBlog</h1>
        <p>一个基于Nginx模块的轻量级博客系统</p>
    </header>

    <main>
        <div class="blog-posts">
            <!-- 博客文章列表 -->
            {{#posts}}
            <article class="blog-post">
                <a href="/blog/post/{{id}}" class="post-title">{{title}}</a>
                <div class="post-meta">
                    <span>作者: {{author}}</span> |
                    <span>发布时间: {{publish_date}}</span> |
                    <span>分类: {{category}}</span>
                </div>
                <div class="post-summary">
                    {{summary}}
                </div>
                <a href="/blog/post/{{id}}" class="read-more">阅读全文 &raquo;</a>
            </article>
            {{/posts}}

            <!-- 如果没有文章 -->
            {{^posts}}
            <div>
                <p>目前还没有博客文章。</p>
            </div>
            {{/posts}}
        </div>
    </main>

    <footer>
        <p>&copy; 2023 TinaBlog - 由Nginx模块强力驱动</p>
    </footer>
</body>
</html>
