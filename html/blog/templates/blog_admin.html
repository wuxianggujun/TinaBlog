<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客管理 - TinaBlog</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        .admin-panel {
            display: flex;
            margin-bottom: 30px;
        }
        .admin-menu {
            flex: 0 0 200px;
            margin-right: 30px;
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }
        .admin-content {
            flex: 1;
        }
        .admin-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .admin-menu li {
            margin-bottom: 10px;
        }
        .admin-menu a {
            display: block;
            padding: 8px 10px;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .admin-menu a:hover, .admin-menu a.active {
            background-color: #3498db;
            color: white;
        }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            margin-right: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-green {
            background-color: #2ecc71;
        }
        .btn-red {
            background-color: #e74c3c;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .post-list {
            width: 100%;
            border-collapse: collapse;
        }
        .post-list th, .post-list td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .post-list th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .post-list tr:hover {
            background-color: #f9f9f9;
        }
        .action-buttons {
            white-space: nowrap;
        }
        .empty-list {
            padding: 40px;
            text-align: center;
            background-color: #f9f9f9;
            border-radius: 5px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <header>
        <h1>博客管理</h1>
        <nav>
            <a href="/">博客首页</a> |
            <a href="/blog/admin">管理控制台</a>
        </nav>
    </header>

    <div class="admin-panel">
        <div class="admin-menu">
            <h3>管理菜单</h3>
            <ul>
                <li><a href="/blog/admin" class="active">文章管理</a></li>
                <li><a href="/blog/admin/add">添加文章</a></li>
                <li><a href="/blog/admin/categories">分类管理</a></li>
                <li><a href="/blog/admin/settings">博客设置</a></li>
            </ul>
        </div>
        
        <div class="admin-content">
            <h2>文章管理</h2>
            
            <div style="margin-bottom: 20px">
                <a href="/blog/admin/add" class="btn btn-green">
                    <span style="font-weight: bold;">+</span> 添加新文章
                </a>
            </div>
            
            {{#posts}}
            <table class="post-list">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>作者</th>
                        <th>分类</th>
                        <th>发布日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {{posts}}
                </tbody>
            </table>
            {{/posts}}
            
            {{^posts}}
            <div class="empty-list">
                <p>暂无文章数据</p>
                <p><a href="/blog/admin/add" class="btn">添加第一篇文章</a></p>
            </div>
            {{/posts}}
        </div>
    </div>

    <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; color: #777;">
        <p>TinaBlog - 基于Nginx模块的简单博客系统</p>
    </footer>
</body>
</html>
