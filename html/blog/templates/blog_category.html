<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - TinaBlog</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        .blog-post {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .post-title {
            font-size: 24px;
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }
        .post-title:hover {
            color: #3498db;
        }
        .post-meta {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        .post-summary {
            margin-bottom: 15px;
        }
        .read-more {
            display: inline-block;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .read-more:hover {
            text-decoration: underline;
        }
        .no-posts {
            padding: 30px;
            background-color: #f9f9f9;
            border-radius: 5px;
            text-align: center;
            color: #7f8c8d;
            font-size: 18px;
        }
        .category-badge {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{title}}</h1>
        <p>{{description}}</p>
        <nav>
            <a href="/">首页</a> |
            <a href="/blog/categories">分类</a>
        </nav>
    </header>

    <main>
        <div class="category-badge">{{category}}</div>
        
        {{#posts}}
        {{#posts}}
        {{/posts}}
        {{/posts}}
        
        {{^posts}}
        {{^posts}}
        {{/posts}}
        {{/posts}}
    </main>

    <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; color: #777;">
        <p>TinaBlog - 基于Nginx模块的简单博客系统</p>
    </footer>
</body>
</html>
